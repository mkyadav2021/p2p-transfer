<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; connect-src ws://localhost:8080 wss:; script-src 'self' https://cdn.jsdelivr.net; style-src 'self'"
    />
    <title>P2P File Transfer</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="card">
      <h1>P2P File Transfer</h1>

      <!-- Sender: file drop zone -->
      <div id="drop-zone">
        <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        <p>Drop a file here</p>
        <span>or click to browse</span>
        <input type="file" id="file-input" />
      </div>

      <!-- Receiver: connection panel -->
      <div id="receiver-view" hidden>
        <div class="receiver-badge">
          <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          <div>
            <p class="receiver-label">Joining room</p>
            <p id="room-id-display" class="receiver-room-id"></p>
          </div>
        </div>
      </div>

      <!-- Both: file info (sender = picked file, receiver = incoming file) -->
      <div id="file-info" hidden>
        <div class="info-row">
          <span class="info-label">File</span>
          <span id="file-name"></span>
        </div>
        <div class="info-row">
          <span class="info-label">Size</span>
          <span id="file-size"></span>
        </div>
      </div>

      <!-- Sender: share link + QR code -->
      <div id="link-section" hidden>
        <label for="share-link">Share this link with the receiver:</label>
        <div class="link-row">
          <input type="text" id="share-link" readonly />
          <button id="copy-btn">Copy</button>
        </div>
        <div id="qr-code"></div>
      </div>

      <!-- Both: transfer progress -->
      <div id="transfer-section" hidden>
        <div class="progress-wrap">
          <div id="progress-bar"></div>
        </div>
        <div class="progress-stats">
          <span id="progress-pct">0%</span>
          <span id="transfer-speed"></span>
        </div>
      </div>

      <!-- Receiver: download button -->
      <div id="download-section" hidden>
        <a id="download-btn">Download</a>
      </div>

      <p id="status"></p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
